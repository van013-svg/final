<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From Rain to Ruins</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌧️ RAIN OVER ENTIRE PAGE -->
<div class="rain">
    <span style="left:2%; animation-duration:1.8s;"></span>
    <span style="left:6%; animation-duration:2.1s;"></span>
    <span style="left:10%; animation-duration:1.7s;"></span>
    <span style="left:14%; animation-duration:2.2s;"></span>
    <span style="left:18%; animation-duration:1.9s;"></span>
    <span style="left:22%; animation-duration:2.0s;"></span>
    <span style="left:26%; animation-duration:1.8s;"></span>
    <span style="left:30%; animation-duration:2.3s;"></span>
    <span style="left:34%; animation-duration:1.6s;"></span>
    <span style="left:38%; animation-duration:2.1s;"></span>
    <span style="left:42%; animation-duration:1.9s;"></span>
    <span style="left:46%; animation-duration:2.0s;"></span>
    <span style="left:50%; animation-duration:1.8s;"></span>
    <span style="left:54%; animation-duration:2.2s;"></span>
    <span style="left:58%; animation-duration:1.7s;"></span>
    <span style="left:62%; animation-duration:2.0s;"></span>
    <span style="left:66%; animation-duration:1.9s;"></span>
    <span style="left:70%; animation-duration:2.1s;"></span>
    <span style="left:74%; animation-duration:1.8s;"></span>
    <span style="left:78%; animation-duration:2.0s;"></span>
    <span style="left:82%; animation-duration:1.9s;"></span>
    <span style="left:86%; animation-duration:2.1s;"></span>
    <span style="left:90%; animation-duration:1.8s;"></span>
</div>

<!-- 🌊 SCENE FLOW -->
<div class="scene-wrapper">

    <!-- 🌧️ HERO -->
    <section class="hero scene">

        <div class="content">
            <h1>FROM RAIN TO RUINS</h1>

            <p>
                Rainfall nourishes ecosystems and replenishes water supplies.
                But when precipitation exceeds absorption capacity,
                flooding transforms entire communities in hours.
            </p>

            <div class="scroll-indicator">
                Scroll to Explore ↓
            </div>
        </div>

    </section>

    <!-- ☁️ CLOUD + STORY SCENE -->
    <section class="cloud-scene scene">

        <div class="clouds">

            <img src="images/cloud4.png" class="cloud main-cloud">
            <img src="images/cloud4.png" class="cloud cloud-back c-back1">
            <img src="images/cloud4.png" class="cloud cloud-back c-back2">
            <img src="images/cloud4.png" class="cloud cloud-back c-back3">

        </div>

        <!-- 🌊 STORY TEXT LAYER -->
        <div class="storm-text">
        </div>

        
    </section>

</div>

<!-- 🌪️ SCROLL TRANSITION -->
<script>
window.addEventListener("scroll", () => {

    const scrollY = window.scrollY;
    const vh = window.innerHeight;

    const hero = document.querySelector(".hero");
    const clouds = document.querySelector(".cloud-scene");

    const progress = Math.min(scrollY / vh, 1);

    hero.style.opacity = 1 - progress;
    clouds.style.opacity = progress;

});
</script>

</body>
</html>
